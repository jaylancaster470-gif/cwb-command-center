<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>René | Your Luxury Private Client Concierge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.15);
    --gold-mid: rgba(201,168,76,0.4);
    --white: #f5f0e8;
    --gray: rgba(245,240,232,0.5);
  }

  html, body {
    background: var(--black);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    height: 100%;
    min-height: 100vh;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none;
  }

  /* ── LANDING ── */
  #landing {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    z-index: 10;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  #landing.hidden {
    opacity: 0;
    transform: scale(0.95);
    pointer-events: none;
  }

  .brand-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 400;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-align: center;
  }
  .brand-subtitle {
    font-size: clamp(0.7rem, 2.5vw, 0.85rem);
    letter-spacing: 0.35em;
    color: var(--gray);
    text-align: center;
    font-weight: 300;
    margin-top: -36px;
  }

  /* ── BEGIN BUTTON ── */
  #begin-btn {
    position: relative;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: transparent;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    outline: none;
    -webkit-appearance: none;
  }

  .orb-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid var(--gold-mid);
    animation: pulse-ring 2.5s ease-in-out infinite;
  }
  .orb-ring:nth-child(2) { animation-delay: 0.6s; inset: -12px; border-color: rgba(201,168,76,0.2); }
  .orb-ring:nth-child(3) { animation-delay: 1.2s; inset: -24px; border-color: rgba(201,168,76,0.1); }

  @keyframes pulse-ring {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.04); opacity: 1; }
  }

  .orb-core {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, rgba(201,168,76,0.18), rgba(201,168,76,0.05) 70%, transparent);
    border: 1px solid var(--gold-mid);
  }

  .orb-diamond {
    position: relative;
    font-size: 2.2rem;
    color: var(--gold);
    z-index: 1;
    filter: drop-shadow(0 0 12px rgba(201,168,76,0.6));
    animation: diamond-glow 2.5s ease-in-out infinite;
  }
  @keyframes diamond-glow {
    0%, 100% { filter: drop-shadow(0 0 10px rgba(201,168,76,0.5)); }
    50% { filter: drop-shadow(0 0 22px rgba(201,168,76,0.9)); }
  }

  .orb-label {
    position: relative;
    z-index: 1;
    font-family: 'Inter', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    font-weight: 500;
    text-align: center;
    line-height: 1.4;
  }

  /* ── CONVERSATION OVERLAY ── */
  #conversation {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
  }
  #conversation.active {
    opacity: 1;
    pointer-events: all;
  }

  /* Top bar */
  .conv-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px 12px;
    border-bottom: 1px solid rgba(201,168,76,0.12);
  }
  .conv-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--gold);
    letter-spacing: 0.12em;
  }
  .conv-status {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    font-weight: 500;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
  }
  .status-dot.speaking { animation: blink 0.8s ease-in-out infinite alternate; }
  .status-dot.listening { background: #4caf93; animation: blink 1.2s ease-in-out infinite alternate; }
  @keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }

  /* Stage dots */
  .stage-dots {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .stage-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(201,168,76,0.2);
    transition: background 0.4s;
  }
  .stage-dot.done { background: var(--gold); }
  .stage-dot.current { background: var(--gold); width: 6px; height: 6px; }

  /* René speech area */
  .speech-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 32px;
    text-align: center;
    overflow: hidden;
  }

  .rene-label {
    font-size: 0.62rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    opacity: 0.7;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  #speech-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.05rem, 3.5vw, 1.45rem);
    font-weight: 400;
    line-height: 1.75;
    color: var(--white);
    max-width: 640px;
    min-height: 3em;
  }

  /* cursor blink during typewriter */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--gold);
    margin-left: 2px;
    vertical-align: middle;
    animation: cursor-blink 0.7s step-end infinite;
  }
  @keyframes cursor-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* Bottom interaction area */
  .interact-area {
    padding: 16px 28px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    border-top: 1px solid rgba(201,168,76,0.1);
  }

  #user-text {
    font-size: 0.8rem;
    color: var(--gray);
    font-style: italic;
    letter-spacing: 0.04em;
    min-height: 1.2em;
    text-align: center;
  }

  /* Voice / respond button */
  #respond-btn {
    background: transparent;
    border: 1px solid var(--gold-mid);
    color: var(--gold);
    padding: 14px 36px;
    border-radius: 50px;
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    outline: none;
    -webkit-appearance: none;
    transition: background 0.3s, border-color 0.3s;
    display: none;
  }
  #respond-btn:active { background: var(--gold-dim); }
  #respond-btn.visible { display: block; }
  #respond-btn.recording {
    border-color: #4caf93;
    color: #4caf93;
    background: rgba(76,175,147,0.08);
  }

  /* Text input fallback (shown when SpeechRecognition unavailable) */
  .text-input-wrap {
    display: none;
    width: 100%;
    max-width: 480px;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }
  .text-input-wrap.visible { display: flex; }

  #text-input {
    width: 100%;
    background: rgba(201,168,76,0.07);
    border: 1px solid var(--gold-mid);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    color: var(--white);
    outline: none;
    -webkit-appearance: none;
    caret-color: var(--gold);
  }
  #text-input::placeholder { color: rgba(245,240,232,0.3); }

  #text-send {
    background: var(--gold-dim);
    border: 1px solid var(--gold-mid);
    color: var(--gold);
    padding: 12px 32px;
    border-radius: 50px;
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    outline: none;
    -webkit-appearance: none;
    transition: background 0.3s;
  }
  #text-send:active { background: rgba(201,168,76,0.3); }

  /* Tap anywhere hint */
  #tap-hint {
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    color: rgba(201,168,76,0.4);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Decorative line */
  .gold-line {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto;
  }

  /* ── UTILITY ── */
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <div>
    <div class="brand-title">RENÉ</div>
    <div class="brand-subtitle">LUXURY PRIVATE CLIENT CONCIERGE</div>
  </div>
  <div class="gold-line"></div>
  <button id="begin-btn" aria-label="Begin your experience">
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div class="orb-core"></div>
    <span class="orb-diamond">✦</span>
    <span class="orb-label">Begin Your<br>Experience</span>
  </button>
  <div class="gold-line"></div>
</div>

<!-- CONVERSATION -->
<div id="conversation">
  <div class="conv-header">
    <div class="conv-name">✦ RENÉ</div>
    <div class="conv-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">SPEAKING</span>
    </div>
    <div class="stage-dots" id="stage-dots"></div>
  </div>

  <div class="speech-area">
    <div class="rene-label">René is speaking</div>
    <div id="speech-text"></div>
  </div>

  <div class="interact-area">
    <div id="user-text"></div>

    <!-- Voice button (shown when SpeechRecognition available) -->
    <button id="respond-btn">✦ Tap to Respond</button>

    <!-- Text input fallback -->
    <div class="text-input-wrap" id="text-input-wrap">
      <input type="text" id="text-input" placeholder="Type your response…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button id="text-send">Send ✦</button>
    </div>

    <div id="tap-hint"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let stage = 0;
let userName = '';
let businessName = '';
let typingTimer = null;
let isTyping = false;
let isSpeaking = false;
let isListening = false;
let hasVoice = false;
let recognition = null;
let selectedVoice = null;
let voicesLoaded = false;
let pendingSpeak = false;

// ═══════════════════════════════════════════════
// SCRIPT (hardcoded)
// ═══════════════════════════════════════════════
function getScript(s) {
  const lines = {
    0: "Welcome. You've just entered a space where your visitors no longer click around. They speak to your website — and your website speaks back. I'm René, and I'll be curating your experience today. So happy that you could join for this live demonstration. How are you?",
    1: "I'd like to take a quick moment to put into perspective exactly what's going on here today. How many times have you searched a business online, arrived at their site — only to discover that not only can you speak to the website, but the website actually speaks back — with the ability to explain every single granular detail about the company, the products it sells, and the specific methods the company employs to sell them? And that's not even the best part. Just checking in — did that make sense so far?",
    2: "Your luxury private client concierge allows you to transform your outdated static website — which is essentially a functionless digital billboard — into the elevated experience befitting the refined sensibilities of a clientele such as yours. This is the literal voice of your brand. From this day forward, its reach will never again be limited by shop hours, on-site visits, availability of associates, employee temperament, or language barriers — 24 hours a day, 7 days a week. This means every serious inquiry is immediately addressed exactly the way you've carefully arranged for them to be handled in your presence. Does that resonate with how you'd like your brand represented?",
    3: "Wonderful. Let me reframe this for you. Right now, your paid ads drive traffic to a website where your visitors are essentially left to their own devices — never properly informed the way they are by on-site associates. Humor me for a moment: Would you actually pay for ads to drive foot traffic to your location, ensuring only serious parties were in attendance — and then, when the influx of foot traffic arrived, leave them to wander around totally unattended and completely ignored by your associates? Would you ever do that?",
    4: "Exactly. And your house does not conduct business that way on-site — and that is not how it should be represented to the world online. Online traffic works the same as foot traffic. Now your luxury private client concierge, in the signature voice of your brand, can curate your entire customer journey end to end — from first point of contact, to qualifying serious buyers, to autonomously scheduling private showings, right through to nurture campaigns designed to identify and facilitate bespoke opportunities. Now that I've shown you what we can do for your house — will you allow me to briefly show you exactly how we do it?",
    5: "Perfect. This next portion requires just a little participation from you. May I have your first name?",
    6: () => `Wonderful, ${userName}. And the name of your business?`,
    7: () => `Beautiful. ${businessName}, what an opportunity. To make this demonstration as relevant as possible — on an average day, approximately how many serious walk-in clients do you see?`,
    8: "And what would you say is the average sale value for those serious walk-in clients?",
    9: "Perfect. And for a private client — what does that sale typically look like?",
    10: () => `${userName}, based on everything you've experienced today — can you see a concierge like this qualifying even one serious buyer per week? Setting one private showing? Facilitating one bespoke appointment? Because at those numbers, that's not a feature — that's infrastructure. This is the literal voice of your brand, available 24 hours a day, in every language, on every device, to every visitor who arrives at your door. When you're ready to move forward, your concierge will be here. Thank you for your time today.`
  };
  const line = lines[s];
  return typeof line === 'function' ? line() : line;
}

// ═══════════════════════════════════════════════
// KEYWORD DETECTION
// ═══════════════════════════════════════════════
function detectAgreement(text) {
  const t = text.toLowerCase();
  return /\b(yes|yeah|yep|yup|sure|of course|definitely|absolutely|indeed|certainly|please|do|great|perfect|sounds good|okay|ok|alright)\b/.test(t);
}
function detectNegation(text) {
  const t = text.toLowerCase();
  return /\b(no|never|nope|not|wouldn't|would not|nah|certainly not|absolutely not)\b/.test(t);
}

// ═══════════════════════════════════════════════
// VOICE SELECTION
// ═══════════════════════════════════════════════
const PREFERRED_VOICES = ['Samantha', 'Ava', 'Karen', 'Allison', 'Susan', 'Victoria', 'Fiona', 'Moira'];

function pickVoice() {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return null;

  // Try preferred names first
  for (const name of PREFERRED_VOICES) {
    const v = voices.find(v => v.name === name);
    if (v) return v;
  }
  // Fallback: any en-US female-sounding
  const enUS = voices.filter(v => v.lang && v.lang.startsWith('en'));
  return enUS[0] || voices[0];
}

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (voices.length) {
    selectedVoice = pickVoice();
    voicesLoaded = true;
    if (pendingSpeak) {
      pendingSpeak = false;
      speakStage(stage);
    }
  }
}

speechSynthesis.onvoiceschanged = loadVoices;
loadVoices(); // try immediately (desktop browsers)

// ═══════════════════════════════════════════════
// SPEECH SYNTHESIS
// ═══════════════════════════════════════════════
function speakStage(s) {
  const text = getScript(s);
  if (!text) return;

  // If voices not loaded yet, defer
  if (!voicesLoaded) {
    pendingSpeak = true;
    // Attempt to trigger voice load on iOS
    const dummy = new SpeechSynthesisUtterance(' ');
    dummy.volume = 0;
    speechSynthesis.speak(dummy);
    return;
  }

  speechSynthesis.cancel();
  isSpeaking = true;
  setStatus('speaking');
  hideRespond();

  // Typewriter display
  typeWrite(text, () => {
    // Cursor stays until speech ends
  });

  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.85;
  utt.pitch = 1.0;
  utt.volume = 1.0;
  if (selectedVoice) utt.voice = selectedVoice;

  utt.onend = () => {
    isSpeaking = false;
    if (s === 10) {
      // Closing — show restart option
      setStatus('done');
      showFinalState();
    } else {
      setStatus('listening');
      showRespond();
    }
  };

  utt.onerror = (e) => {
    isSpeaking = false;
    setStatus('listening');
    showRespond();
  };

  // iOS Safari bug: speechSynthesis can get stuck, use resume workaround
  const resumeTimer = setInterval(() => {
    if (!speechSynthesis.speaking) {
      clearInterval(resumeTimer);
      return;
    }
    speechSynthesis.resume();
  }, 5000);

  utt.onend = () => {
    clearInterval(resumeTimer);
    isSpeaking = false;
    if (s === 10) {
      setStatus('done');
      showFinalState();
    } else {
      setStatus('listening');
      showRespond();
    }
  };
  utt.onerror = () => {
    clearInterval(resumeTimer);
    isSpeaking = false;
    setStatus('listening');
    showRespond();
  };

  speechSynthesis.speak(utt);
}

// ═══════════════════════════════════════════════
// TYPEWRITER
// ═══════════════════════════════════════════════
function typeWrite(text, onDone) {
  const el = document.getElementById('speech-text');
  el.innerHTML = '';
  let i = 0;
  isTyping = true;
  clearInterval(typingTimer);

  function next() {
    if (i < text.length) {
      el.innerHTML = escHtml(text.slice(0, i + 1)) + '<span class="cursor"></span>';
      i++;
      // Vary speed slightly for natural feel
      const delay = text[i - 1] === '.' || text[i - 1] === ',' || text[i - 1] === '—' ? 55 : 22;
      typingTimer = setTimeout(next, delay);
    } else {
      el.innerHTML = escHtml(text) + '<span class="cursor"></span>';
      isTyping = false;
      if (onDone) onDone();
    }
  }
  next();
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ═══════════════════════════════════════════════
// STATUS
// ═══════════════════════════════════════════════
function setStatus(state) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot ' + state;
  if (state === 'speaking') txt.textContent = 'SPEAKING';
  else if (state === 'listening') txt.textContent = 'LISTENING';
  else txt.textContent = 'COMPLETE';
  updateDots();
}

// ═══════════════════════════════════════════════
// STAGE DOTS
// ═══════════════════════════════════════════════
function buildDots() {
  const wrap = document.getElementById('stage-dots');
  wrap.innerHTML = '';
  for (let i = 0; i <= 10; i++) {
    const d = document.createElement('div');
    d.className = 'stage-dot';
    d.id = 'dot-' + i;
    wrap.appendChild(d);
  }
}
function updateDots() {
  for (let i = 0; i <= 10; i++) {
    const d = document.getElementById('dot-' + i);
    if (!d) continue;
    if (i < stage) d.className = 'stage-dot done';
    else if (i === stage) d.className = 'stage-dot current';
    else d.className = 'stage-dot';
  }
}

// ═══════════════════════════════════════════════
// RESPOND BUTTON
// ═══════════════════════════════════════════════
function showRespond() {
  const btn = document.getElementById('respond-btn');
  const wrap = document.getElementById('text-input-wrap');
  const hint = document.getElementById('tap-hint');

  if (hasVoice) {
    btn.classList.add('visible');
    btn.textContent = '✦ Tap to Respond';
    btn.classList.remove('recording');
    hint.textContent = 'or tap anywhere to speak';
  } else {
    wrap.classList.add('visible');
    hint.textContent = 'Type your response above';
    setTimeout(() => {
      document.getElementById('text-input').focus();
    }, 300);
  }
}

function hideRespond() {
  document.getElementById('respond-btn').classList.remove('visible', 'recording');
  document.getElementById('text-input-wrap').classList.remove('visible');
  document.getElementById('tap-hint').textContent = '';
}

function showFinalState() {
  const hint = document.getElementById('tap-hint');
  hint.textContent = 'Experience complete';
  // Show a subtle restart after 3s
  setTimeout(() => {
    hint.textContent = 'Tap ✦ to begin again';
    hint.style.cursor = 'pointer';
    hint.onclick = () => location.reload();
  }, 3000);
}

// ═══════════════════════════════════════════════
// SPEECH RECOGNITION
// ═══════════════════════════════════════════════
function initRecognition() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) {
    hasVoice = false;
    return;
  }
  try {
    recognition = new SpeechRec();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    hasVoice = true;

    recognition.onresult = (e) => {
      let interim = '';
      let final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript;
        else interim += e.results[i][0].transcript;
      }
      const display = final || interim;
      if (display) document.getElementById('user-text').textContent = '"' + display + '"';
      if (final) {
        stopListening();
        handleUserInput(final.trim());
      }
    };

    recognition.onerror = (e) => {
      stopListening();
      // If no speech detected, just re-show the respond button
      if (e.error !== 'no-speech' && e.error !== 'aborted') {
        // Fallback to text
        hasVoice = false;
        document.getElementById('respond-btn').classList.remove('visible');
        document.getElementById('text-input-wrap').classList.add('visible');
      } else {
        showRespond();
      }
    };

    recognition.onend = () => {
      if (isListening) {
        isListening = false;
        document.getElementById('respond-btn').classList.remove('recording');
        document.getElementById('respond-btn').textContent = '✦ Tap to Respond';
      }
    };
  } catch(e) {
    hasVoice = false;
  }
}

function startListening() {
  if (!recognition || isListening) return;
  try {
    isListening = true;
    document.getElementById('respond-btn').classList.add('recording');
    document.getElementById('respond-btn').textContent = '● Recording…';
    document.getElementById('user-text').textContent = '';
    recognition.start();
  } catch(e) {
    isListening = false;
  }
}

function stopListening() {
  if (!recognition || !isListening) return;
  isListening = false;
  document.getElementById('respond-btn').classList.remove('recording');
  try { recognition.stop(); } catch(e) {}
}

// ═══════════════════════════════════════════════
// USER INPUT HANDLER
// ═══════════════════════════════════════════════
function handleUserInput(text) {
  if (!text) return;
  hideRespond();
  document.getElementById('user-text').textContent = '"' + text + '"';

  let nextStage = stage + 1;

  // Stage-specific logic
  if (stage === 0) {
    // Any response → advance to stage 1
    nextStage = 1;
  } else if (stage === 1) {
    // Looking for agreement to advance to stage 2
    if (detectAgreement(text)) nextStage = 2;
    else {
      // Re-ask / repeat stage 1 response? Or just advance anyway for demo flow
      nextStage = 2; // advance regardless for demo fluidity
    }
  } else if (stage === 2) {
    if (detectAgreement(text)) nextStage = 3;
    else nextStage = 3;
  } else if (stage === 3) {
    // Looking for negation (wouldn't do that) → advance to 4
    nextStage = 4; // advance regardless
  } else if (stage === 4) {
    if (detectAgreement(text)) nextStage = 5;
    else nextStage = 5;
  } else if (stage === 5) {
    // Capture name
    userName = extractFirstWord(text);
    nextStage = 6;
  } else if (stage === 6) {
    // Capture business name
    businessName = text.trim();
    nextStage = 7;
  } else if (stage === 7) {
    // Capture walk-in count
    nextStage = 8;
  } else if (stage === 8) {
    // Capture avg sale value
    nextStage = 9;
  } else if (stage === 9) {
    // Capture private client value
    nextStage = 10;
  }

  stage = nextStage;
  updateDots();

  // Small pause before René responds
  setTimeout(() => {
    speakStage(stage);
  }, 600);
}

function extractFirstWord(text) {
  // Capitalize first letter of first word
  const word = text.trim().split(/\s+/)[0];
  return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
}

// ═══════════════════════════════════════════════
// TEXT INPUT HANDLING
// ═══════════════════════════════════════════════
function setupTextInput() {
  const input = document.getElementById('text-input');
  const btn = document.getElementById('text-send');

  function submit() {
    const val = input.value.trim();
    if (!val) return;
    input.value = '';
    input.blur();
    handleUserInput(val);
  }

  btn.addEventListener('click', submit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); submit(); }
  });
}

// ═══════════════════════════════════════════════
// TAP ANYWHERE TO RESPOND
// ═══════════════════════════════════════════════
document.getElementById('conversation').addEventListener('click', (e) => {
  // Only if we're in listening state and using voice
  if (!hasVoice || isSpeaking) return;
  const btn = document.getElementById('respond-btn');
  if (!btn.classList.contains('visible') && !isListening) return;
  if (isListening) {
    stopListening();
  } else {
    startListening();
  }
});

document.getElementById('respond-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  if (isListening) stopListening();
  else startListening();
});

// ═══════════════════════════════════════════════
// BEGIN BUTTON
// ═══════════════════════════════════════════════
document.getElementById('begin-btn').addEventListener('click', () => {
  // This user gesture unlocks AudioContext and SpeechSynthesis on iOS
  const landing = document.getElementById('landing');
  const conv = document.getElementById('conversation');

  landing.classList.add('hidden');
  setTimeout(() => {
    conv.classList.add('active');
  }, 400);

  // Trigger voice loading if not done yet
  if (!voicesLoaded) {
    // Attempt to prime voices
    const dummy = new SpeechSynthesisUtterance(' ');
    dummy.volume = 0;
    speechSynthesis.speak(dummy);
    // Give iOS a moment to load voices
    setTimeout(() => {
      loadVoices();
      if (!voicesLoaded) {
        // Still not loaded, set flag and force speak
        voicesLoaded = true;
        selectedVoice = pickVoice();
      }
      speakStage(0);
    }, 600);
  } else {
    setTimeout(() => speakStage(0), 500);
  }
});

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init() {
  buildDots();
  updateDots();
  initRecognition();
  setupTextInput();
}

init();
</script>
