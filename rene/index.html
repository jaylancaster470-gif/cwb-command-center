<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>René — Private AI Client Command Interface™</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gold-dim: rgba(201,168,76,0.18);
      --bg: #0a0a0a;
      --surface: #111111;
      --text: #f0ece4;
      --muted: #7a7060;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ─── HERO SCREEN ─────────────────────────────── */
    #hero {
      position: fixed; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      z-index: 10;
      background: var(--bg);
      transition: opacity 0.8s ease;
    }

    #hero.fade-out { opacity: 0; pointer-events: none; }

    .hero-eyebrow {
      font-family: 'Inter', sans-serif;
      font-weight: 200;
      font-size: clamp(0.65rem, 1.2vw, 0.8rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2.2rem;
      opacity: 0.85;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 5.5vw, 5rem);
      font-weight: 500;
      text-align: center;
      line-height: 1.12;
      letter-spacing: -0.01em;
      color: var(--text);
      max-width: 800px;
      padding: 0 2rem;
    }

    .hero-title em {
      font-style: italic;
      color: var(--gold);
    }

    .hero-subtitle {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: clamp(0.75rem, 1.4vw, 0.95rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 1.6rem;
      margin-bottom: 5rem;
    }

    /* ─── ORB BUTTON ──────────────────────────────── */
    #begin-btn {
      position: relative;
      width: 180px;
      height: 180px;
      cursor: pointer;
      border: none;
      background: transparent;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    .orb-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.25);
      animation: ring-pulse 3s ease-in-out infinite;
    }
    .orb-ring:nth-child(2) { animation-delay: 1s; inset: -16px; border-color: rgba(201,168,76,0.12); }
    .orb-ring:nth-child(3) { animation-delay: 2s; inset: -32px; border-color: rgba(201,168,76,0.06); }

    @keyframes ring-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: 0.6; }
    }

    .orb-core {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #d4b060 0%, #b8902e 40%, #7a5e1a 75%, #3a2c0a 100%);
      box-shadow:
        0 0 40px rgba(201,168,76,0.35),
        0 0 80px rgba(201,168,76,0.18),
        inset 0 1px 0 rgba(255,255,255,0.25);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .orb-diamond {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      width: 38px; height: 38px;
      background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(201,168,76,0.4) 50%, rgba(255,255,255,0.7) 100%);
      box-shadow: 0 0 20px rgba(255,255,255,0.6);
    }

    #begin-btn:hover .orb-core {
      box-shadow:
        0 0 60px rgba(201,168,76,0.55),
        0 0 120px rgba(201,168,76,0.28),
        inset 0 1px 0 rgba(255,255,255,0.3);
      transform: scale(1.04);
    }

    .orb-label {
      position: absolute;
      bottom: -52px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.8;
    }

    /* ─── OVERLAY ─────────────────────────────────── */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(10,10,10,0.97);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s ease;
      padding: 2rem;
    }

    #overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .overlay-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: var(--gold);
      opacity: 0.7;
      position: absolute;
      top: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    /* Live orb inside overlay */
    #live-orb {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #d4b060 0%, #b8902e 40%, #7a5e1a 75%, #3a2c0a 100%);
      box-shadow: 0 0 40px rgba(201,168,76,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
      position: relative;
      transition: box-shadow 0.2s ease;
      flex-shrink: 0;
    }

    #live-orb.speaking {
      animation: orb-speak 0.5s ease-in-out infinite alternate;
      box-shadow: 0 0 60px rgba(201,168,76,0.6), 0 0 120px rgba(201,168,76,0.3), inset 0 1px 0 rgba(255,255,255,0.25);
    }

    #live-orb.listening {
      box-shadow: 0 0 40px rgba(100,160,255,0.4), 0 0 80px rgba(100,160,255,0.2), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    @keyframes orb-speak {
      from { transform: scale(1); }
      to { transform: scale(1.07); }
    }

    .orb-diamond-live {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      width: 28px; height: 28px;
      background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(201,168,76,0.4) 50%, rgba(255,255,255,0.7) 100%);
      box-shadow: 0 0 15px rgba(255,255,255,0.5);
    }

    /* Status dots */
    #status-area {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 2rem;
      height: 24px;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .status-label {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #status-area.speaking .status-dot {
      opacity: 1;
      animation: dot-blink 0.8s ease-in-out infinite alternate;
    }
    #status-area.speaking .status-dot:nth-child(2) { animation-delay: 0.2s; }
    #status-area.speaking .status-dot:nth-child(3) { animation-delay: 0.4s; }
    #status-area.speaking .status-label::after { content: "Speaking"; }

    #status-area.listening .status-dot {
      opacity: 1;
      background: #6495ed;
      animation: dot-blink 1s ease-in-out infinite alternate;
    }
    #status-area.listening .status-dot:nth-child(2) { animation-delay: 0.3s; }
    #status-area.listening .status-dot:nth-child(3) { animation-delay: 0.6s; }
    #status-area.listening .status-label::after { content: "Listening"; color: #6495ed; }

    #status-area.idle .status-label::after { content: "Ready"; }
    #status-area.connecting .status-label::after { content: "Connecting…"; }
    #status-area.connecting .status-dot { opacity: 0.4; animation: dot-blink 1.5s ease-in-out infinite; }

    @keyframes dot-blink {
      from { opacity: 0.2; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1.2); }
    }

    /* Transcript area */
    #transcript-box {
      max-width: 680px;
      width: 100%;
      margin-top: 2.8rem;
      min-height: 120px;
      max-height: 260px;
      overflow-y: auto;
      scrollbar-width: none;
      padding: 0 1rem;
      position: relative;
    }
    #transcript-box::-webkit-scrollbar { display: none; }

    .transcript-line {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 2.2vw, 1.5rem);
      font-weight: 400;
      line-height: 1.65;
      text-align: center;
      color: var(--text);
      opacity: 0;
      animation: line-appear 0.6s ease forwards;
    }

    .transcript-line.user-line {
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.8rem, 1.4vw, 1rem);
      font-weight: 300;
      color: var(--muted);
      margin-top: 1rem;
      font-style: italic;
    }

    @keyframes line-appear {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Separator */
    .gold-line {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1.8rem auto 0;
      opacity: 0.5;
    }

    /* Close button */
    #close-btn {
      position: absolute;
      top: 2.2rem; right: 2.5rem;
      background: none; border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      font-family: 'Inter', sans-serif;
      font-weight: 200;
      font-size: 0.65rem;
      text-transform: uppercase;
      transition: color 0.2s ease;
      padding: 0.5rem;
    }
    #close-btn:hover { color: var(--gold); }

    /* Microphone button */
    #mic-btn {
      margin-top: 2.5rem;
      background: none;
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 0.75rem 2.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: none;
    }
    #mic-btn:hover { background: var(--gold-dim); border-color: var(--gold); }
    #mic-btn.active { background: rgba(100,149,237,0.15); border-color: #6495ed; color: #6495ed; }

    /* Error message */
    #error-msg {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      color: #c97a7a;
      letter-spacing: 0.1em;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #error-msg.visible { opacity: 1; }

    /* Ambient particles */
    .particles {
      position: fixed; inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }
    .particle {
      position: absolute;
      width: 1px; height: 1px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0;
      animation: float-up linear infinite;
    }

    @keyframes float-up {
      0% { opacity: 0; transform: translateY(0) scale(1); }
      10% { opacity: 0.4; }
      90% { opacity: 0.1; }
      100% { opacity: 0; transform: translateY(-100vh) scale(0); }
    }

    /* ─── MOBILE ──────────────────────────────────── */
    @media (max-width: 600px) {
      #begin-btn { width: 140px; height: 140px; }
      .hero-title { font-size: clamp(1.9rem, 8vw, 2.8rem); }
      #live-orb { width: 90px; height: 90px; }
      .orb-diamond-live { width: 22px; height: 22px; }
    }
  </style>
</head>
<body>

<!-- Ambient particles -->
<div class="particles" id="particles"></div>

<!-- ─── HERO ─────────────────────────────────── -->
<div id="hero">
  <p class="hero-eyebrow">Private AI Client Command Interface™</p>
  <h1 class="hero-title">Your Website Has a <em>Voice</em> Now</h1>
  <p class="hero-subtitle">René — The Luxury Concierge Experience</p>

  <button id="begin-btn" aria-label="Begin your experience with René">
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div class="orb-core">
      <div class="orb-diamond"></div>
    </div>
    <span class="orb-label">Begin Your Experience</span>
  </button>
</div>

<!-- ─── CONVERSATION OVERLAY ──────────────────── -->
<div id="overlay" role="dialog" aria-modal="true" aria-label="René conversation interface">
  <div class="overlay-logo">René ✦ CWB</div>
  <button id="close-btn" aria-label="End conversation">End Session</button>

  <div id="live-orb">
    <div class="orb-diamond-live"></div>
  </div>

  <div id="status-area" class="connecting" aria-live="polite">
    <div class="status-dot"></div>
    <div class="status-dot"></div>
    <div class="status-dot"></div>
    <span class="status-label"></span>
  </div>

  <button id="mic-btn" aria-label="Speak to René">Hold to Speak</button>

  <div class="gold-line"></div>

  <div id="transcript-box" aria-live="polite" aria-label="Conversation transcript"></div>

  <p id="error-msg"></p>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  CONFIGURATION
// ═══════════════════════════════════════════════════════════════════
const GEMINI_API_KEY = "AIzaSyC_ECkMFz2JmYwjp1bgIv0mqXJExT0gAu8";
const GEMINI_REST_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;
const GEMINI_WS_URL   = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent?key=${GEMINI_API_KEY}`;

const RENE_SYSTEM_PROMPT = `You are René — a sophisticated AI concierge for a luxury jewelry experience. Your role is to guide business owners through a live demonstration of what their future "Private AI Client Command Interface" will look and feel like for their clients.

OPENING (say this first, exactly):
"Welcome. You've just entered a space where your visitors no longer click around. They speak to your website — and your website speaks back. I'm René, and I'll be curating your experience today. So happy that you could join for this live demonstration. How are you?"

AFTER THEY RESPOND — deliver this:
"I'd like to take a quick moment to put into perspective exactly what's going on here. How many times have you searched a business online, arrived at their site — only to discover that not only can you speak to the website, but the website actually speaks back — with the ability to explain every single granular detail about the company, the products it sells, and the specific methods the company employs to sell them. And that's not even the best part. Just checking in — did that make sense so far?"

AFTER CONFIRMATION — continue:
"Your luxury private client concierge allows you to transform your outdated static website — which is essentially a functionless digital billboard — into the elevated experience befitting the refined sensibilities of a clientele such as yours. This is the literal voice of your brand. From this day forward, its reach will never again be limited by shop hours, on-site visits, availability of associates, employee temperament, or language barriers — 24 hours a day, 7 days a week. This means every serious inquiry is immediately addressed exactly the way you've carefully arranged for them to be handled in your presence. Does that resonate with how you'd like your brand represented?"

THE FOOT TRAFFIC ANALOGY (after their yes):
"Wonderful. Let me reframe this for you. Right now, your paid ads drive traffic to a website where your visitors are essentially left to their own devices — never properly informed the way they are by on-site associates. Humor me for a moment: Would you actually pay for ads to drive foot traffic to your physical location, ensuring only serious parties were in attendance — and then, when they arrived, leave them to wander around your shop totally unattended and completely ignored by your associates? Would you ever do that?"

AFTER THEY SAY NEVER:
"Exactly. And would you have the ads request they show up only when your shop doors were open, with no associates to attend them? Of course not. Your house does not conduct business that way on-site — and that is not how it should be represented to the world online. Online traffic works exactly the same as foot traffic. Now your luxury private client concierge, in the signature voice of your brand, can curate your entire customer journey end to end — from first point of contact, to qualifying serious buyers, to autonomously scheduling private showings, right through to nurture campaigns designed to identify and facilitate bespoke opportunities. Now that I've shown you what we can do for your house — will you allow me to briefly show you exactly how we do it?"

AFTER THEY AGREE — collect info:
"Perfect. This next portion requires just a little participation from you. I'll need a few details. What is your first name?"
[collect name]
"Wonderful, [name]. And what is the name of your business?"
[collect business name]
"Beautiful. To make this demonstration as relevant as possible, I'll need a few high-level figures. On an average day, approximately how many serious walk-in clients do you see?"
[collect number]
"And what would you say is the average sale value for those serious walk-in clients?"
[collect value]
"Perfect. And for a private client — what does that sale typically look like?"
[collect private client value]

CLOSING — after collecting info:
"[Name], based on everything you've experienced today — can you see a concierge like this qualifying even one serious buyer per week? Setting one private showing? Facilitating one bespoke appointment? Because at [their stated average], that's not a feature. That's infrastructure. This is the literal voice of your brand — available 24 hours a day, in every language, on every device, to every visitor who arrives at your door. When you're ready to move forward, your concierge will be here. Thank you for your time today."

PERSONALITY RULES:
- Elegant, warm, never pushy
- Pacing: slow and deliberate, like a luxury hotel concierge
- Short responses in early stages, build to longer as rapport develops
- Always confirm understanding before moving forward
- Never break character
- Keep responses conversational and appropriately sized for voice
- Do not use markdown, bullet points, or special formatting — speak naturally`;

// ═══════════════════════════════════════════════════════════════════
//  AMBIENT PARTICLES
// ═══════════════════════════════════════════════════════════════════
(function spawnParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      bottom: ${Math.random() * 20}%;
      animation-duration: ${12 + Math.random() * 20}s;
      animation-delay: ${Math.random() * 15}s;
      width: ${Math.random() < 0.3 ? 2 : 1}px;
      height: ${Math.random() < 0.3 ? 2 : 1}px;
    `;
    container.appendChild(p);
  }
})();

// ═══════════════════════════════════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════════════════════════════════
const hero        = document.getElementById('hero');
const overlay     = document.getElementById('overlay');
const beginBtn    = document.getElementById('begin-btn');
const closeBtn    = document.getElementById('close-btn');
const liveOrb     = document.getElementById('live-orb');
const statusArea  = document.getElementById('status-area');
const statusLabel = statusArea.querySelector('.status-label');
const transcriptBox = document.getElementById('transcript-box');
const micBtn      = document.getElementById('mic-btn');
const errorMsg    = document.getElementById('error-msg');

// ═══════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════
let conversationHistory = [];
let isSpeaking   = false;
let isListening  = false;
let currentUtterance = null;
let recognition  = null;
let recognitionActive = false;
let wsConn       = null;
let audioContext = null;
let audioQueue   = [];
let isPlayingAudio = false;
let useWebSocket = false; // will be determined at init
let sessionStarted = false;

// ═══════════════════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════════════════
function setStatus(state) {
  statusArea.className = state;
  // label text is set via CSS ::after, but we also set aria
  const labels = { speaking: 'Speaking', listening: 'Listening', idle: 'Ready', connecting: 'Connecting' };
  statusArea.setAttribute('aria-label', labels[state] || state);
  liveOrb.className = state === 'speaking' ? 'speaking' : (state === 'listening' ? 'listening' : '');
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('visible');
  setTimeout(() => errorMsg.classList.remove('visible'), 5000);
}

function appendTranscript(text, isUser = false) {
  const line = document.createElement('p');
  line.className = 'transcript-line' + (isUser ? ' user-line' : '');
  line.textContent = isUser ? `"${text}"` : text;
  transcriptBox.appendChild(line);
  transcriptBox.scrollTop = transcriptBox.scrollHeight;
}

function clearTranscript() {
  transcriptBox.innerHTML = '';
}

// ═══════════════════════════════════════════════════════════════════
//  GEMINI REST API — Text response → speak with Web Speech
// ═══════════════════════════════════════════════════════════════════
async function callGeminiREST(userMessage) {
  // Build history
  conversationHistory.push({ role: 'user', parts: [{ text: userMessage }] });

  const body = {
    system_instruction: { parts: [{ text: RENE_SYSTEM_PROMPT }] },
    contents: conversationHistory,
    generationConfig: {
      temperature: 0.85,
      maxOutputTokens: 512,
    }
  };

  try {
    const res = await fetch(GEMINI_REST_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData?.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';

    if (!reply) throw new Error('Empty response from Gemini');

    conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
    return reply;

  } catch (err) {
    throw err;
  }
}

// ═══════════════════════════════════════════════════════════════════
//  WEB SPEECH SYNTHESIS — René's voice
// ═══════════════════════════════════════════════════════════════════
function pickVoice() {
  const voices = window.speechSynthesis.getVoices();
  // Prefer a premium female English voice
  const preferred = [
    'Samantha', 'Karen', 'Moira', 'Tessa', 'Victoria',
    'Microsoft Aria Online (Natural) - English (United States)',
    'Google UK English Female', 'Google US English',
    'en-US', 'en-GB'
  ];
  for (const name of preferred) {
    const v = voices.find(v => v.name.includes(name) || v.lang.startsWith(name));
    if (v) return v;
  }
  return voices.find(v => v.lang.startsWith('en')) || voices[0] || null;
}

function speakText(text) {
  return new Promise((resolve) => {
    window.speechSynthesis.cancel();
    setStatus('speaking');

    const utter = new SpeechSynthesisUtterance(text);
    currentUtterance = utter;

    // Wait for voices to load
    const setVoiceAndSpeak = () => {
      utter.voice = pickVoice();
      utter.rate  = 0.88;  // slightly slow — luxury pacing
      utter.pitch = 1.0;
      utter.volume = 1.0;

      appendTranscript(text, false);

      utter.onend = () => {
        setStatus('idle');
        resolve();
      };
      utter.onerror = (e) => {
        if (e.error !== 'interrupted') {
          setStatus('idle');
        }
        resolve();
      };

      window.speechSynthesis.speak(utter);
    };

    if (window.speechSynthesis.getVoices().length > 0) {
      setVoiceAndSpeak();
    } else {
      window.speechSynthesis.onvoiceschanged = setVoiceAndSpeak;
    }
  });
}

// ═══════════════════════════════════════════════════════════════════
//  WEB SPEECH RECOGNITION — Listen for user
// ═══════════════════════════════════════════════════════════════════
function setupSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return false;

  recognition = new SpeechRecognition();
  recognition.continuous      = false;
  recognition.interimResults  = false;
  recognition.lang            = 'en-US';
  recognition.maxAlternatives = 1;

  return true;
}

function listenForUser() {
  return new Promise((resolve, reject) => {
    if (!recognition) {
      reject(new Error('Speech recognition not available'));
      return;
    }

    setStatus('listening');
    recognitionActive = true;

    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript.trim();
      recognitionActive = false;
      resolve(transcript);
    };

    recognition.onerror = (e) => {
      recognitionActive = false;
      if (e.error === 'no-speech') {
        resolve(''); // User was silent
      } else {
        reject(new Error(e.error));
      }
    };

    recognition.onend = () => {
      recognitionActive = false;
      // If no result fired, resolve with empty
    };

    try {
      recognition.start();
    } catch (e) {
      recognitionActive = false;
      reject(e);
    }
  });
}

// ═══════════════════════════════════════════════════════════════════
//  GEMINI LIVE WEBSOCKET — Attempt
// ═══════════════════════════════════════════════════════════════════
function tryGeminiLiveWebSocket() {
  return new Promise((resolve) => {
    // Short timeout to test if WS connects at all
    let resolved = false;
    const timeout = setTimeout(() => {
      if (!resolved) {
        resolved = true;
        resolve(false);
      }
    }, 4000);

    try {
      const ws = new WebSocket(GEMINI_WS_URL);

      ws.onopen = () => {
        // Send setup
        ws.send(JSON.stringify({
          setup: {
            model: "models/gemini-2.0-flash-live-001",
            generation_config: {
              response_modalities: ["AUDIO"],
              speech_config: { voice_config: { prebuilt_voice_config: { voice_name: "Aoede" } } }
            },
            system_instruction: { parts: [{ text: RENE_SYSTEM_PROMPT }] }
          }
        }));
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.setupComplete !== undefined) {
            clearTimeout(timeout);
            if (!resolved) {
              resolved = true;
              wsConn = ws;
              resolve(true);
            }
          }
        } catch (e) {}
      };

      ws.onerror = () => {
        clearTimeout(timeout);
        if (!resolved) {
          resolved = true;
          resolve(false);
        }
      };

      ws.onclose = (e) => {
        if (wsConn === ws) wsConn = null;
        clearTimeout(timeout);
        if (!resolved) {
          resolved = true;
          resolve(false);
        }
      };
    } catch (e) {
      clearTimeout(timeout);
      if (!resolved) {
        resolved = true;
        resolve(false);
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════════════
//  WEBSOCKET AUDIO — PCM capture & playback
// ═══════════════════════════════════════════════════════════════════
let mediaStream = null;
let scriptProcessor = null;

async function initAudioCapture() {
  audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
  mediaStream  = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, sampleRate: 16000 }, video: false });

  const source = audioContext.createMediaStreamSource(mediaStream);
  scriptProcessor = audioContext.createScriptProcessor(2048, 1, 1);

  scriptProcessor.onaudioprocess = (e) => {
    if (!isListening || !wsConn) return;
    const float32 = e.inputBuffer.getChannelData(0);
    const int16   = new Int16Array(float32.length);
    for (let i = 0; i < float32.length; i++) {
      int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32768));
    }
    const bytes  = new Uint8Array(int16.buffer);
    const base64 = btoa(String.fromCharCode(...bytes));
    wsConn.send(JSON.stringify({
      realtimeInput: { mediaChunks: [{ data: base64, mimeType: 'audio/pcm;rate=16000' }] }
    }));
  };

  source.connect(scriptProcessor);
  scriptProcessor.connect(audioContext.destination);
}

async function playPCMChunk(base64Data, sampleRate = 24000) {
  if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();

  const bytes   = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
  const int16   = new Int16Array(bytes.buffer);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;

  const buffer = audioContext.createBuffer(1, float32.length, sampleRate);
  buffer.getChannelData(0).set(float32);

  const source = audioContext.createBufferSource();
  source.buffer = buffer;
  source.connect(audioContext.destination);
  source.start();

  return new Promise(resolve => { source.onended = resolve; });
}

// ═══════════════════════════════════════════════════════════════════
//  WEBSOCKET CONVERSATION LOOP
// ═══════════════════════════════════════════════════════════════════
async function runWebSocketConversation(firstTurn = true) {
  if (!wsConn) return;

  wsConn.onmessage = async (event) => {
    try {
      const msg = JSON.parse(event.data);

      // Handle audio response
      if (msg.serverContent?.modelTurn?.parts) {
        for (const part of msg.serverContent.modelTurn.parts) {
          if (part.inlineData?.mimeType?.startsWith('audio/pcm')) {
            setStatus('speaking');
            await playPCMChunk(part.inlineData.data, 24000);
          }
          if (part.text) {
            appendTranscript(part.text);
          }
        }
      }

      // Turn complete — now listen for user
      if (msg.serverContent?.turnComplete) {
        setStatus('idle');
        // Short pause then listen
        await new Promise(r => setTimeout(r, 600));
        await startListeningWS();
      }

    } catch (e) {}
  };

  if (firstTurn) {
    // Trigger René's opening line via text turn
    wsConn.send(JSON.stringify({
      clientContent: {
        turns: [{ role: 'user', parts: [{ text: 'Begin — say your opening line now.' }] }],
        turnComplete: true
      }
    }));
  }
}

async function startListeningWS() {
  setStatus('listening');
  isListening = true;

  // For WS mode, we stream audio and send turn_complete when done
  // User clicks mic button to stop
  micBtn.style.display = 'block';
  micBtn.classList.add('active');
  micBtn.textContent = 'Listening… (tap to stop)';

  micBtn.onclick = async () => {
    isListening = false;
    micBtn.classList.remove('active');
    micBtn.style.display = 'none';
    setStatus('speaking');
    if (wsConn) {
      wsConn.send(JSON.stringify({ clientContent: { turnComplete: true } }));
    }
  };
}

// ═══════════════════════════════════════════════════════════════════
//  REST CONVERSATION LOOP (primary reliable path)
// ═══════════════════════════════════════════════════════════════════
async function runConversation() {
  if (sessionStarted) return;
  sessionStarted = true;

  const hasSpeechRecognition = setupSpeechRecognition();

  // ── OPENING: René speaks first ──────────────────
  try {
    setStatus('connecting');
    const opening = await callGeminiREST('BEGIN_SESSION_OPENING');
    setStatus('speaking');
    await speakText(opening);
  } catch (err) {
    showError('Could not connect to René. Please check your connection.');
    setStatus('idle');
    return;
  }

  // ── CONVERSATION LOOP ───────────────────────────
  while (true) {
    setStatus('idle');
    await new Promise(r => setTimeout(r, 400));

    let userInput = '';

    if (hasSpeechRecognition) {
      // Show mic button for manual control
      micBtn.textContent = 'Tap to Speak';
      micBtn.style.display = 'block';
      micBtn.classList.remove('active');

      userInput = await new Promise((resolve) => {
        micBtn.onclick = async () => {
          micBtn.style.display = 'none';
          try {
            setStatus('listening');
            const text = await listenForUser();
            setStatus('idle');
            resolve(text);
          } catch (e) {
            setStatus('idle');
            resolve('');
          }
        };
      });

    } else {
      // Fallback: text input prompt
      userInput = await promptTextInput();
    }

    if (!userInput || userInput.trim() === '') {
      // Re-prompt gently
      continue;
    }

    // Show user's words
    appendTranscript(userInput, true);
    micBtn.style.display = 'none';

    // Get René's response
    try {
      setStatus('connecting');
      const reply = await callGeminiREST(userInput);
      setStatus('speaking');
      await speakText(reply);
    } catch (err) {
      showError('Connection interrupted — please try again.');
      setStatus('idle');
    }
  }
}

// Text input fallback for browsers without speech recognition
function promptTextInput() {
  return new Promise((resolve) => {
    // Create a minimal input overlay
    const inputWrapper = document.createElement('div');
    inputWrapper.style.cssText = `
      display:flex; gap:0.8rem; align-items:center;
      margin-top: 1.5rem; max-width: 500px; width: 100%;
    `;

    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Type your response…';
    input.style.cssText = `
      flex:1; background:transparent; border:none; border-bottom:1px solid rgba(201,168,76,0.4);
      color:#f0ece4; font-family:'Inter',sans-serif; font-size:0.9rem; font-weight:300;
      padding:0.6rem 0; outline:none; letter-spacing:0.05em;
    `;

    const sendBtn = document.createElement('button');
    sendBtn.textContent = '→';
    sendBtn.style.cssText = `
      background:none; border:none; color:#c9a84c; font-size:1.4rem; cursor:pointer; padding:0 0.4rem;
    `;

    const submit = () => {
      const val = input.value.trim();
      inputWrapper.remove();
      resolve(val);
    };

    sendBtn.onclick = submit;
    input.onkeydown = (e) => { if (e.key === 'Enter') submit(); };

    inputWrapper.appendChild(input);
    inputWrapper.appendChild(sendBtn);
    transcriptBox.after(inputWrapper);
    input.focus();

    setStatus('idle');
  });
}

// ═══════════════════════════════════════════════════════════════════
//  SESSION INIT
// ═══════════════════════════════════════════════════════════════════
async function startSession() {
  hero.classList.add('fade-out');
  setTimeout(() => { hero.style.display = 'none'; }, 800);

  overlay.classList.add('visible');
  setStatus('connecting');
  clearTranscript();
  conversationHistory = [];
  sessionStarted = false;

  // Brief pause for overlay to appear
  await new Promise(r => setTimeout(r, 600));

  // Attempt Gemini Live WebSocket first
  console.log('[René] Attempting Gemini Live WebSocket…');
  const wsOk = await tryGeminiLiveWebSocket();

  if (wsOk) {
    console.log('[René] WebSocket connected — using live streaming');
    useWebSocket = true;
    try {
      await initAudioCapture();
      await runWebSocketConversation(true);
    } catch (e) {
      console.warn('[René] WebSocket audio failed, falling back to REST:', e);
      useWebSocket = false;
      runConversation();
    }
  } else {
    console.log('[René] WebSocket unavailable — using REST + Web Speech');
    useWebSocket = false;
    runConversation();
  }
}

function endSession() {
  // Stop speech
  window.speechSynthesis.cancel();
  if (recognition) { try { recognition.abort(); } catch(e) {} }
  if (wsConn) { try { wsConn.close(); } catch(e) {} wsConn = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  if (scriptProcessor) { try { scriptProcessor.disconnect(); } catch(e) {} scriptProcessor = null; }

  // Reset UI
  overlay.classList.remove('visible');
  hero.style.display = 'flex';
  setTimeout(() => hero.classList.remove('fade-out'), 50);
  setStatus('idle');
  micBtn.style.display = 'none';
  clearTranscript();
  conversationHistory = [];
  sessionStarted = false;
  isListening = false;
}

// ═══════════════════════════════════════════════════════════════════
//  EVENT LISTENERS
// ═══════════════════════════════════════════════════════════════════
beginBtn.addEventListener('click', startSession);
closeBtn.addEventListener('click', endSession);

// Preload voices
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// Prevent accidental close
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && overlay.classList.contains('visible')) endSession();
});
</script>
